apiVersion: 'serving.kserve.io/v1beta1'
kind: 'InferenceService'
metadata:
  name: 'mlflow-iris-classifier'
  namespace: 'mlflow-kserve'
spec:
  predictor:
    model:
      modelFormat:
        name: mlflow
      protocolVersion: v2
      runtime: kserve-mlserver
      storageUri: 'gs://k8s-mlflow-mlruns/artifacts/iris'
      resources:
        requests:
          cpu: '100m'
          memory: '512Mi'
        limits:
          cpu: '1'
          memory: '1Gi'
