# https://raw.githubusercontent.com/kserve/kserve/refs/heads/master/install/v0.17.0-rc1/kserve-cluster-resources.yaml
apiVersion: serving.kserve.io/v1alpha1
kind: ClusterServingRuntime
metadata:
  annotations:
    serving.kserve.io/server-type: mlserver
  name: kserve-mlserver
spec:
  annotations:
    prometheus.kserve.io/path: /metrics
    prometheus.kserve.io/port: '8080'
  containers:
    - env:
        - name: MLSERVER_MODEL_IMPLEMENTATION
          value: '{{.Labels.modelClass}}'
        - name: MLSERVER_HTTP_PORT
          value: '8080'
        - name: MLSERVER_GRPC_PORT
          value: '9000'
      image: docker.io/seldonio/mlserver:1.5.0
      name: kserve-container
      resources:
        limits:
          cpu: '1'
          memory: 2Gi
        requests:
          cpu: '1'
          memory: 2Gi
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        privileged: false
        runAsNonRoot: true
  protocolVersions:
    - v2
  supportedModelFormats:
    - autoSelect: true
      name: sklearn
      priority: 2
      version: '0'
    - autoSelect: true
      name: sklearn
      priority: 2
      version: '1'
    - autoSelect: true
      name: xgboost
      priority: 2
      version: '1'
    - autoSelect: true
      name: xgboost
      priority: 2
      version: '2'
    - autoSelect: true
      name: lightgbm
      priority: 2
      version: '3'
    - autoSelect: true
      name: lightgbm
      priority: 2
      version: '4'
    - autoSelect: true
      name: mlflow
      priority: 1
      version: '1'
    - autoSelect: true
      name: mlflow
      priority: 1
      version: '2'
